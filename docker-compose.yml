services:

  # ─────────────────────────────────────────────
  # PocketBase — API & base de données
  # Accessible uniquement en interne (réseau Docker)
  # JAMAIS exposé directement sur l'hôte
  # ─────────────────────────────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: cafe_pocketbase
    restart: unless-stopped

    volumes:
      # Données persistantes — montées sur l'hôte
      # Le fichier data.db survit aux redémarrages et mises à jour
      - ./pb_data:/pb/pb_data
      # (Optionnel) Hooks PocketBase personnalisés
      # - ./pb_hooks:/pb/pb_hooks


    # PocketBase n'est PAS exposé sur l'hôte directement.
    # Seul Nginx peut l'atteindre via le réseau interne "cafe_net".
    expose:
      - "8090"

    networks:
      - cafe_net

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  # ─────────────────────────────────────────────
  # Nginx — Reverse proxy + site statique
  # Seul service exposé sur l'hôte (80 + 443)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cafe_nginx
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy

    ports:
      - "80:80"

    volumes:
      # Config Nginx
      - ./nginx/conf.d/cafedeslettres.conf:/etc/nginx/conf.d/default.conf:ro
      # Fichiers statiques du site
      - ./site:/var/www/cafedeslettres:ro
      # Logs
      - ./logs/nginx:/var/log/nginx

    networks:
      - cafe_net

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3


# ─────────────────────────────────────────────
# Réseau interne isolé
# Seul Nginx peut parler à PocketBase
# ─────────────────────────────────────────────
networks:
  cafe_net:
    driver: bridge
